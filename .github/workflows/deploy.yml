name: CI/CD Multi-Project Deploy

on:
  push:
    branches: [ "main" ] # 🚀 main 브랜치에 코드가 push되면 자동으로 로봇이 가동됩니다.

jobs:
  # [1단계: 어떤 폴더가 바뀌었는지 실시간 감지 및 개별 Docker 빌드/푸시]
  changes-and-build:
    runs-on: ubuntu-latest
    outputs:
      react: ${{ steps.filter.outputs.react }}
      springboot: ${{ steps.filter.outputs.springboot }}
      fastapi: ${{ steps.filter.outputs.fastapi }}
    steps:
      - name: 깃허브 코드 가져오기
        uses: actions/checkout@v3

      # 🔍 어떤 폴더가 수정되었는지 똑똑하게 필터링합니다.
      - name: 변경된 폴더 감지
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            react: 'model-front/**'
            springboot: 'model-api/app/**'
            fastapi: 'model_test/model_app/**'

      # 🔐 수정사항이 하나라도 있다면 도커 허브에 로그인합니다.
      - name: Docker Hub 로그인
        if: steps.filter.outputs.react == 'true' || steps.filter.outputs.springboot == 'true' || steps.filter.outputs.fastapi == 'true'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 💻 ① 리액트 폴더가 변경되었을 때만 빌드 및 푸시
      - name: React Build & Push
        if: steps.filter.outputs.react == 'true'
        run: |
          docker build -t parkjh3736/model_app-react-app:latest ./model-front
          docker push parkjh3736/model_app-react-app:latest

      # ☕ ② 스프링부트 폴더가 변경되었을 때만 빌드 및 푸시
      - name: Spring Boot Build & Push
        if: steps.filter.outputs.springboot == 'true'
        run: |
          docker build -t parkjh3736/model_app-springboot-app:latest ./model-api/app
          docker push parkjh3736/model_app-springboot-app:latest

      # 🐍 ③ FastAPI 폴더가 변경되었을 때만 빌드 및 푸시
      - name: FastAPI Build & Push
        if: steps.filter.outputs.fastapi == 'true'
        run: |
          docker build -t parkjh3736/model_app-fastapi-app:latest ./model_test/model_app
          docker push parkjh3736/model_app-fastapi-app:latest

  # [2단계: AWS EC2 운영 서버에 원격 접속하여 컨테이너 교체 명령]
  deploy-to-ec2:
    needs: changes-and-build
    runs-on: ubuntu-latest
    # 세 프로젝트 중 하나라도 바뀐 게 있을 때만 EC2 접속 프로세스를 시작합니다.
    if: needs.changes-and-build.outputs.react == 'true' || needs.changes-and-build.outputs.springboot == 'true' || needs.changes-and-build.outputs.fastapi == 'true'
    steps:
      - name: EC2 SSH 원격 접속 및 서비스 갱신
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/model-app
            
            # 도커 허브로부터 새로 빌드되어 올라온 최신 이미지만 싹 다운로드(Pull)
            sudo docker compose pull
            
            # 서비스 무중단 교체 진행 (수정되어 풀 받아온 컨테이너만 영리하게 리스타트됨)
            sudo docker compose up -d
            
            # 서버 용량 관리를 위해 쓰이지 않게 된 옛날 이미지 레이어(찌꺼기) 자동 청소
            sudo docker image prune -f